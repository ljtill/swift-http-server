name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - uses: vapor/swiftly-action@v0.2
      with:
        toolchain: latest
    - name: Build
      run: swift build -v
    - name: Run tests
      run: swift test -v
